<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net;">
    <title>Bem-vindo - S.I.L.T. System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }
            50% { box-shadow: 0 0 50px rgba(168, 85, 247, 0.7); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }

        .welcome-card {
            max-width: 600px;
            width: 100%;
            text-align: center;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        .welcome-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 32px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-purple-dark));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
            opacity: 0;
            animation: fadeIn 0.6s ease 0.3s forwards;
        }

        .welcome-greeting {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.5s forwards;
        }

        .welcome-name {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-purple-light), var(--neon-purple));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite;
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.7s forwards;
        }

        .welcome-message-box {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.9s forwards;
        }

        .welcome-message-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .welcome-message {
            font-size: 18px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .welcome-btn-container {
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .welcome-btn-container.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            animation: slideUp 0.5s ease forwards;
        }

        .welcome-btn {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-purple-dark));
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .welcome-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .welcome-btn:hover::before {
            left: 100%;
        }

        .welcome-btn:hover {
            box-shadow: 0 0 40px var(--neon-glow);
            transform: translateY(-2px);
        }

        .welcome-btn:active {
            transform: translateY(0);
        }

        /* Loading state */
        .welcome-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .welcome-loading .spinner {
            width: 48px;
            height: 48px;
        }

        /* No message state */
        .welcome-no-message {
            text-align: center;
            padding: 40px;
        }

        .welcome-no-message p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="particles"></div>

    <div id="welcome-loading" class="welcome-loading">
        <div class="spinner"></div>
        <p style="color: var(--text-secondary); margin-top: 16px;">Carregando...</p>
    </div>

    <div id="welcome-container" class="welcome-container" style="display: none;">
        <div class="welcome-card">
            <div class="welcome-icon">👋</div>
            <p class="welcome-greeting">Bem-vindo ao S.I.L.T.</p>
            <h1 class="welcome-name" id="user-display-name">Usuário</h1>

            <div class="welcome-message-box">
                <p class="welcome-message-label">Mensagem do Administrador</p>
                <p class="welcome-message" id="admin-message">Carregando mensagem...</p>
            </div>

            <div id="btn-container" class="welcome-btn-container">
                <button class="welcome-btn" id="start-btn" onclick="handleStart()">
                    Começar
                </button>
            </div>
        </div>
    </div>

    <div id="welcome-error" class="welcome-container" style="display: none;">
        <div class="glass-card" style="text-align: center; max-width: 400px;">
            <h2 style="margin-bottom: 16px;">Oops!</h2>
            <p style="color: var(--text-secondary); margin-bottom: 24px;" id="error-message">Algo deu errado. Tente fazer login novamente.</p>
            <a href="login.html" class="neon-btn" style="display: inline-block;">Voltar ao Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/welcome.js"></script>
</body>
</html>
