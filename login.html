<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co https://api.exchangerate-api.com https://cdn.jsdelivr.net;">
    <title>Login - S.I.L.T. System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="particles"></div>
    <div class="header-trigger"></div>

    <header class="floating-header">
        <div class="header-content">
            <a href="index.html" class="logo"><span>◆</span> S.I.L.T.</a>
            <button class="hamburger" id="hamburger-btn" aria-label="Menu" onclick="toggleMobileNav()"><span></span><span></span><span></span></button>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="index.html#sobre">Sobre</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="login-container">
        <div class="glass-card login-card">
            <div class="logo-icon">◆</div>
            <h1>Bem-vindo de volta</h1>
            <p class="subtitle">Entre com suas credenciais para acessar o sistema</p>

            <form id="login-form" method="post">
                <div class="form-group">
                    <label for="username">Usuário ou Email</label>
                    <div class="input-icon">
                        <svg style="position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Digite seu usuário ou email" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-icon">
                        <svg style="position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required autocomplete="current-password">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="neon-btn" id="login-btn">Entrar</button>
                </div>

                <p class="error-message" id="login-error" style="text-align:center;margin-top:16px;"></p>
            </form>

            <div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border-glass);text-align:center;">
                <p style="color:var(--text-secondary);font-size:14px;">
                    Não tem uma conta? <a href="#" style="color:var(--neon-purple);text-decoration:none;">Contate o administrador</a>
                </p>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loading" style="display:none;">
        <div class="spinner"></div>
        <p>Autenticando...</p>
    </div>

    <div class="toast-container"></div>

    <!-- Supabase primeiro, depois os scripts do site -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
<div class="mobile-nav-overlay" id="mob-overlay" onclick="closeMobileNav()"></div>
<div class="mobile-nav-drawer" id="mob-drawer">
  <div class="mobile-nav-header">
    <a href="index.html" class="mobile-nav-logo">◆ S.I.L.T.</a>
    <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
  </div>
  <ul class="mobile-nav-links">
    <li><a href="index.html"><span class="mob-nav-icon">🏠</span> Home</a></li>
    <li><a href="login.html" class="mob-active"><span class="mob-nav-icon">🔐</span> Login</a></li>
    <li><a href="index.html#sobre"><span class="mob-nav-icon">ℹ️</span> Sobre</a></li>
  </ul>
</div>
</body>
</html>
